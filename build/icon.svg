<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>
  <!-- time grid lines -->
  <line x1="280" y1="180" x2="280" y2="844" stroke="#3c3c3c" stroke-width="2"/>
  <line x1="280" y1="290" x2="820" y2="290" stroke="#3c3c3c" stroke-width="1.5"/>
  <line x1="280" y1="400" x2="820" y2="400" stroke="#3c3c3c" stroke-width="1.5"/>
  <line x1="280" y1="510" x2="820" y2="510" stroke="#3c3c3c" stroke-width="1.5"/>
  <line x1="280" y1="620" x2="820" y2="620" stroke="#3c3c3c" stroke-width="1.5"/>
  <line x1="280" y1="730" x2="820" y2="730" stroke="#3c3c3c" stroke-width="1.5"/>
  <!-- time labels -->
  <text x="240" y="195" text-anchor="end" fill="#858585" font-family="SF Mono,monospace" font-size="40">08</text>
  <text x="240" y="305" text-anchor="end" fill="#858585" font-family="SF Mono,monospace" font-size="40">10</text>
  <text x="240" y="415" text-anchor="end" fill="#858585" font-family="SF Mono,monospace" font-size="40">12</text>
  <text x="240" y="525" text-anchor="end" fill="#858585" font-family="SF Mono,monospace" font-size="40">14</text>
  <text x="240" y="635" text-anchor="end" fill="#858585" font-family="SF Mono,monospace" font-size="40">16</text>
  <text x="240" y="745" text-anchor="end" fill="#858585" font-family="SF Mono,monospace" font-size="40">18</text>
  <!-- schedule blocks -->
  <rect x="296" y="180" width="508" height="100" rx="6" fill="#039be5" opacity="0.85"/>
  <rect x="296" y="310" width="508" height="80" rx="6" fill="#f6bf26" opacity="0.85"/>
  <rect x="296" y="420" width="508" height="160" rx="6" fill="#8e24aa" opacity="0.85"/>
  <rect x="296" y="640" width="508" height="80" rx="6" fill="#33b679" opacity="0.85"/>
  <rect x="296" y="750" width="508" height="80" rx="6" fill="#e67c73" opacity="0.85"/>
  <!-- current time line -->
  <circle cx="280" cy="460" r="6" fill="#f44336"/>
  <line x1="280" y1="460" x2="820" y2="460" stroke="#f44336" stroke-width="2.5"/>
  <!-- header text -->
  <text x="512" y="110" text-anchor="middle" fill="#cccccc" font-family="SF Pro Display,Helvetica,sans-serif" font-size="52" font-weight="600">Daily Visual Planner</text>
</svg>
